services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stundenplan}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-appsecret}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-stundenplan}"]
      interval: 3s
      timeout: 3s
      retries: 20
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - planner

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-stundenplan}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-appsecret}
      SCANNER_TOKEN: ${SCANNER_TOKEN:-changeme-dev-scanner-token}
      AUTO_START_SCANNER_ON_EMPTY_DB: ${AUTO_START_SCANNER_ON_EMPTY_DB:-true}
      TUCAN_BASE_URL: ${TUCAN_BASE_URL:-https://www.tucan.tu-darmstadt.de}
      TUCAN_START_URL: ${TUCAN_START_URL:-https://www.tucan.tu-darmstadt.de/scripts/mgrqispi.dll?APPNAME=CampusNet&ARGUMENTS=-Afez3VF0kNRWWWcwTNgBVrq8fobYoZ~dHDF6AnnwI4IIVV5NeLRN~RQaKmVRfjYvXw5IFXBqbO4U5gS9mvWof-jgLzvEgui0iEfQUP0oi0LKBTEAaXWA6aRjZQqOrRcLEIB7t5FVYNDp89oBVTmiQO-07JjBRjOg5UuBJEDVqB00tc~JgnNBFeMR4pg3Oy6LkgbkhuI8Gs3aZLZo_&PRGNAME=ACTION}
      TUCAN_RATE_LIMIT_MS: ${TUCAN_RATE_LIMIT_MS:-750}
      TUCAN_FACULTY_PREFIX: ${TUCAN_FACULTY_PREFIX:-FB20 - Informatik}
      SCAN_BATCH_SIZE: ${SCAN_BATCH_SIZE:-10}
      PORT: 4000
    expose:
      - "4000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - planner

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      VITE_API_URL: ${VITE_API_URL:-/api}
      API_PROXY_TARGET: ${API_PROXY_TARGET:-http://backend:4000}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-semesti.plani.dev}
    expose:
      - "3000"
    depends_on:
      - backend
    networks:
      - planner

  scanner:
    build:
      context: .
      dockerfile: scanner/Dockerfile
    environment:
      BACKEND_API_URL: http://backend:4000/api
      SCANNER_TOKEN: ${SCANNER_TOKEN:-changeme-dev-scanner-token}
      TUCAN_BASE_URL: ${TUCAN_BASE_URL:-https://www.tucan.tu-darmstadt.de}
      TUCAN_START_URL: ${TUCAN_START_URL:-https://www.tucan.tu-darmstadt.de/scripts/mgrqispi.dll?APPNAME=CampusNet&ARGUMENTS=-Afez3VF0kNRWWWcwTNgBVrq8fobYoZ~dHDF6AnnwI4IIVV5NeLRN~RQaKmVRfjYvXw5IFXBqbO4U5gS9mvWof-jgLzvEgui0iEfQUP0oi0LKBTEAaXWA6aRjZQqOrRcLEIB7t5FVYNDp89oBVTmiQO-07JjBRjOg5UuBJEDVqB00tc~JgnNBFeMR4pg3Oy6LkgbkhuI8Gs3aZLZo_&PRGNAME=ACTION}
      TUCAN_RATE_LIMIT_MS: ${TUCAN_RATE_LIMIT_MS:-750}
      SCAN_INTERVAL_HOURS: ${SCAN_INTERVAL_HOURS:-24}
      TUCAN_FACULTY_PREFIX: ${TUCAN_FACULTY_PREFIX:-FB20 - Informatik}
      SCAN_BATCH_SIZE: ${SCAN_BATCH_SIZE:-10}
    depends_on:
      - backend
    networks:
      - planner

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token=${CF_TUNNEL_TOKEN:-}
    restart: unless-stopped
    environment:
      CF_TUNNEL_TOKEN: ${CF_TUNNEL_TOKEN:-}
    depends_on:
      - frontend
    networks:
      - planner

volumes:
  pgdata:

networks:
  planner:
