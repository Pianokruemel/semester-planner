services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: stundenplan
      POSTGRES_USER: app
      POSTGRES_PASSWORD: appsecret
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d stundenplan"]
      interval: 3s
      timeout: 3s
      retries: 20
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgres://app:appsecret@db:5432/stundenplan
      PORT: 4000
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    environment:
      VITE_API_URL: http://localhost:4000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
